<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Code Review</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">
                <span class="gradient-text">AI Code Review Studio</span>
            </div>
            <p>Powered by OpenRouter and Nemotron-120B</p>
        </header>
        
        <main>
            <div class="editor-section">
                <div class="header-bar" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 id="fileNameLabel">Source Code</h3>
                    <label for="fileInput" class="upload-btn">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" width="16" height="16"
                             style="margin-bottom:-2px">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path>
                        </svg>
                        Upload File
                    </label>
                    <input type="file" id="fileInput" style="display: none;">
                </div>
                <textarea id="codeInput" placeholder="Paste your code snippet here..."></textarea>
                <div class="actions">
                    <button id="reviewBtn" class="primary-btn">
                        <span>Analyze Code</span>
                        <div class="loader" id="loader" style="display: none;"></div>
                    </button>
                </div>
            </div>
            
            <div class="review-section">
                <div class="header-bar">
                    <h3>AI Feedback</h3>
                </div>
                <div id="reviewOutput" class="output-content markdown-body">
                    <div class="placeholder-text">Your AI code review feedback will appear here...</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Minimal markdown parser for nice formatting -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.getElementById('fileInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            document.getElementById('fileNameLabel').innerText = `Source Code (${file.name})`;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('codeInput').value = e.target.result;
            };
            reader.readAsText(file);
        });

        document.getElementById('reviewBtn').addEventListener('click', async () => {
            const code = document.getElementById('codeInput').value;
            if (!code.trim()) return;

            const btn = document.getElementById('reviewBtn');
            const loader = document.getElementById('loader');
            const output = document.getElementById('reviewOutput');

            // Loading state
            btn.classList.add('loading');
            loader.style.display = 'block';
            output.innerHTML = '<div class="loading-state">Analyzing code...</div>';

            try {
                const response = await fetch('/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code: code })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    output.innerHTML = `<div class="error" style="color: #ff5555;">Error: ${data.error}</div>`;
                } else {
                    output.innerHTML = marked.parse(data.review);
                }
            } catch (err) {
                output.innerHTML = `<div class="error" style="color: #ff5555;">Failed to connect to the server.</div>`;
            } finally {
                btn.classList.remove('loading');
                loader.style.display = 'none';
            }
        });
    </script>
</body>
</html>
